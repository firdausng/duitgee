<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="needle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669" />
      <stop offset="100%" style="stop-color:#10b981" />
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="64" cy="64" r="63" fill="none" stroke="#10b981" stroke-width="5" />

  <!-- Inner face -->
  <circle cx="64" cy="64" r="57" fill="#f0fdf4" />

  <!-- Cardinal positions: G E E W -->
  <text x="64" y="26" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#059669" text-anchor="middle">G</text>
  <text x="112" y="70" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#059669" text-anchor="middle">E</text>
  <text x="64" y="116" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#059669" text-anchor="middle">E</text>
  <text x="16" y="70" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#10b981" text-anchor="middle">W</text>

  <!-- Needle -->
  <polygon points="64,28 73,64 64,72 55,64" fill="url(#needle)" />
  <polygon points="64,100 73,64 64,56 55,64" fill="#d1fae5" />

  <!-- Center orb -->
  <circle cx="64" cy="64" r="8" fill="#059669" />
  <circle cx="64" cy="64" r="5" fill="#10b981" />
</svg>
